kind = "web"
previewPath = "/"
title = "PARISA MEMORY PORTAL"
version = "1.0.0"
id = "parisa-portal"
router = "path"

[[services]]
name = "web"
paths = ["/"]
localPort = 23236

[services.development]
run = "pnpm --filter @workspace/parisa-portal run dev"

[services.env]
PORT = "23236"
BASE_PATH = "/"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/parisa-portal", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"
BASE_PATH = "/"

[services.production.run]
args = ["pnpm", "--filter", "@workspace/parisa-portal", "run", "serve"]

[services.production.run.env]
PORT = "23236"
BASE_PATH = "/"
